spring:
  application:
    name: pis
  server:
    port: ${SERVER_PORT:8080}
  datasource:
    url: ${MySQL_JDBC_URL:jdbc:mysql://localhost:3306/pis?createDatabaseIfNotExist=true}
    username: ${MySQL_USER:root}
    password: ${MySQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

